<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(-45deg,#6a11cb,#2575fc,#00c6ff,#6a11cb);
background-size:400% 400%;
animation:bg 15s ease infinite;
color:white;
overflow-x:hidden;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

header{
padding:30px;
text-align:center;
}

h1{
font-size:50px;
}

.search{
width:90%;
max-width:600px;
margin:auto;
display:block;
padding:15px;
border:none;
border-radius:50px;
font-size:18px;
outline:none;
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:40px;
}

.card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border-radius:25px;
padding:25px;
transition:.35s;
box-shadow:0 20px 40px rgba(0,0,0,.3);
}

.card:hover{
transform:translateY(-10px) scale(1.03);
}

.icon{
font-size:70px;
text-align:center;
}

.price{
font-size:28px;
font-weight:bold;
margin:10px 0;
color:#ffe66d;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
font-size:17px;
background:#00ffae;
cursor:pointer;
transition:.3s;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
background:white;
}

.cart{
position:fixed;
right:20px;
bottom:20px;
background:white;
color:#222;
padding:20px;
border-radius:20px;
width:280px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.cart h2{
margin-bottom:15px;
}

.total{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

footer{
text-align:center;
padding:30px;
opacity:.8;
}
</style>
</head>

<body>

<header>
<h1>🚀 Modern Shop</h1>

<input
class="search"
placeholder="Search products..."
onkeyup="search(this.value)">
</header>

<div class="grid" id="products"></div>

<div class="cart">
<h2>🛒 Cart</h2>
<div id="cartItems">No items</div>
<div class="total">Total: $<span id="total">0</span></div>
</div>

<footer>
Animated Shop UI
</footer>

<script>

const products=[
{name:"Discord Bot",price:10,icon:"🤖"},
{name:"Premium",price:15,icon:"💎"},
{name:"Lifetime",price:40,icon:"⭐"},
{name:"Hosting",price:6,icon:"☁️"},
{name:"Website",price:30,icon:"🌐"},
{name:"Support",price:5,icon:"🎧"}
];

let cart=[];

function render(list){

document.getElementById("products").innerHTML=list.map((p,i)=>`

<div class="card">

<div class="icon">${p.icon}</div>

<h2>${p.name}</h2>

<div class="price">$${p.price}</div>

<button onclick="buy(${products.indexOf(p)})">
Add to Cart
</button>

</div>

`).join("");

}

function buy(id){

cart.push(products[id]);

updateCart();

}

function updateCart(){

if(cart.length==0){

cartItems.innerHTML="No items";
total.innerHTML=0;
return;

}

cartItems.innerHTML=cart.map(x=>`
<div>${x.icon} ${x.name} - $${x.price}</div>
`).join("");

total.innerHTML=cart.reduce((a,b)=>a+b.price,0);

}

function search(text){

text=text.toLowerCase();

render(products.filter(p=>p.name.toLowerCase().includes(text)));

}

render(products);

</script>

</body>
</html>
