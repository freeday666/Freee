<!DOCTYPE html>
<html>
<head>
  <title>Discord Bot Dashboard</title>
  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0b0b0f;
      color:white;
    }

    .box {
      max-width:600px;
      margin:50px auto;
      background:#1a1a22;
      padding:20px;
      border-radius:12px;
    }

    input, button {
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:8px;
    }

    button {
      background:red;
      color:white;
      cursor:pointer;
    }

    h1 { text-align:center; }
  </style>
</head>

<body>

<div class="box">
  <h1>🤖 Discord Bot Panel</h1>

  <input id="token" placeholder="Bot Token">
  <input id="prefix" placeholder="Prefix (!, /, ?)">
  <input id="guild" placeholder="Server ID">

  <button onclick="save()">Save Config</button>

  <p id="status"></p>
</div>

<script>
function save() {
  const config = {
    token: document.getElementById("token").value,
    prefix: document.getElementById("prefix").value,
    guild: document.getElementById("guild").value
  };

  localStorage.setItem("botConfig", JSON.stringify(config));

  document.getElementById("status").innerText =
    "Saved locally (frontend only)";
}
</script>

</body>
</html>
