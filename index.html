<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Midoflex Movies</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0f;
      color: white;
      overflow-x: hidden;
    }

    .hero {
      height: 40vh;
      background: linear-gradient(to bottom, transparent, #0b0b0f),
        url("https://images.unsplash.com/photo-1524985069026-dd778a71c7b4") center/cover;
      display: flex;
      align-items: flex-end;
      padding: 20px;
      animation: zoom 20s infinite alternate;
    }

    @keyframes zoom {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    .container {
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 70%;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      background: red;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    .card {
      width: 150px;
      background: #1a1a22;
      padding: 10px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>🎬 Midoflex Movies</h1>
  </div>

  <div class="container">

    <input id="search" placeholder="Search movies..." />
    <button onclick="searchMovies()">Search</button>

    <div id="results" class="grid"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
