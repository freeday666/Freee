<!DOCTYPE html>
<html>
<head>
  <title>Discord Bot Control</title>
  <style>
    body {
      background:#0b0b0f;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    .box {
      max-width:500px;
      margin:50px auto;
      background:#1a1a22;
      padding:20px;
      border-radius:12px;
    }

    input, button {
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:8px;
    }

    button {
      cursor:pointer;
    }

    .start { background:green; color:white; }
    .stop { background:red; color:white; }
  </style>
</head>

<body>

<div class="box">
  <h1>🤖 Bot Dashboard</h1>

  <input id="token" placeholder="Bot Token">
  <input id="guild" placeholder="Server ID">

  <button class="start" onclick="startBot()">Start Bot</button>
  <button class="stop" onclick="stopBot()">Stop Bot</button>

  <p id="status"></p>
</div>

<script>
async function startBot() {
  const data = {
    token: document.getElementById("token").value,
    guildId: document.getElementById("guild").value
  };

  await fetch("http://localhost:3000/start", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  document.getElementById("status").innerText = "Bot started";
}

async function stopBot() {
  await fetch("http://localhost:3000/stop", {
    method: "POST"
  });

  document.getElementById("status").innerText = "Bot stopped";
}
</script>

</body>
</html>
